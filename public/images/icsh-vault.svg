<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="1600" height="1000" fill="#f8f8f8"/>

  <!-- Grid background -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e0e0e0" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#grid)"/>

  <!-- Title label -->
  <text x="80" y="80" font-size="11" font-weight="700" letter-spacing="4" fill="#999" text-anchor="start">MEMBERSHIP AUTOMATION — WORKFLOW ARCHITECTURE</text>
  <line x1="80" y1="92" x2="400" y2="92" stroke="#ccc" stroke-width="1"/>

  <!-- TOP: Entry point -->
  <!-- Form submission box -->
  <rect x="660" y="120" width="280" height="80" rx="2" fill="white" stroke="#111" stroke-width="1.5"/>
  <text x="800" y="153" font-size="11" font-weight="700" letter-spacing="3" fill="#111" text-anchor="middle">FORM SUBMISSION</text>
  <text x="800" y="172" font-size="10" fill="#666" text-anchor="middle">New application received</text>

  <!-- Arrow down to router -->
  <line x1="800" y1="200" x2="800" y2="260" stroke="#111" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Router / Decision node -->
  <rect x="660" y="260" width="280" height="80" rx="2" fill="#111" stroke="#111" stroke-width="1.5"/>
  <text x="800" y="293" font-size="11" font-weight="700" letter-spacing="3" fill="white" text-anchor="middle">PAYMENT ROUTER</text>
  <text x="800" y="312" font-size="10" fill="#aaa" text-anchor="middle">Route by payment status</text>

  <!-- Three paths branching down -->
  <!-- Left: Completed -->
  <line x1="700" y1="340" x2="300" y2="440" stroke="#111" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Center: Pending -->
  <line x1="800" y1="340" x2="800" y2="440" stroke="#111" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Right: Declined -->
  <line x1="900" y1="340" x2="1300" y2="440" stroke="#111" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Path labels -->
  <rect x="170" y="380" width="110" height="26" fill="white"/>
  <text x="225" y="397" font-size="10" font-weight="700" letter-spacing="2" fill="#111" text-anchor="middle">COMPLETED</text>
  <rect x="740" y="378" width="120" height="26" fill="white"/>
  <text x="800" y="395" font-size="10" font-weight="700" letter-spacing="2" fill="#666" text-anchor="middle">PENDING</text>
  <rect x="1215" y="378" width="110" height="26" fill="white"/>
  <text x="1270" y="395" font-size="10" font-weight="700" letter-spacing="2" fill="#111" text-anchor="middle">DECLINED</text>

  <!-- LEFT PATH — Completed -->
  <!-- CRM write -->
  <rect x="140" y="440" width="280" height="80" rx="2" fill="white" stroke="#111" stroke-width="1.5"/>
  <text x="280" y="473" font-size="11" font-weight="700" letter-spacing="3" fill="#111" text-anchor="middle">CRM WRITE</text>
  <text x="280" y="492" font-size="10" fill="#666" text-anchor="middle">Create / renew member record</text>

  <line x1="280" y1="520" x2="280" y2="580" stroke="#111" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ID generation -->
  <rect x="140" y="580" width="280" height="80" rx="2" fill="white" stroke="#111" stroke-width="1.5"/>
  <text x="280" y="613" font-size="11" font-weight="700" letter-spacing="3" fill="#111" text-anchor="middle">ID GENERATION</text>
  <text x="280" y="632" font-size="10" fill="#666" text-anchor="middle">Unique ID + member-year calc</text>

  <line x1="280" y1="660" x2="280" y2="720" stroke="#111" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Email dispatch -->
  <rect x="140" y="720" width="280" height="80" rx="2" fill="white" stroke="#111" stroke-width="1.5"/>
  <text x="280" y="753" font-size="11" font-weight="700" letter-spacing="3" fill="#111" text-anchor="middle">EMAIL DISPATCH</text>
  <text x="280" y="772" font-size="10" fill="#666" text-anchor="middle">Welcome or welcome-back</text>

  <line x1="280" y1="800" x2="280" y2="860" stroke="#111" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="140" y="860" width="280" height="60" rx="2" fill="#111"/>
  <text x="280" y="893" font-size="11" font-weight="700" letter-spacing="3" fill="white" text-anchor="middle">MEMBER ACTIVE ✓</text>


  <!-- CENTER PATH — Pending -->
  <rect x="660" y="440" width="280" height="80" rx="2" fill="white" stroke="#999" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="800" y="473" font-size="11" font-weight="700" letter-spacing="3" fill="#999" text-anchor="middle">HOLD STATE</text>
  <text x="800" y="492" font-size="10" fill="#aaa" text-anchor="middle">Await confirmation</text>

  <line x1="800" y1="520" x2="800" y2="580" stroke="#999" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-grey)"/>

  <rect x="660" y="580" width="280" height="80" rx="2" fill="white" stroke="#999" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="800" y="613" font-size="11" font-weight="700" letter-spacing="3" fill="#999" text-anchor="middle">RETRY LOGIC</text>
  <text x="800" y="632" font-size="10" fill="#aaa" text-anchor="middle">Auto-retry on CRM failure</text>

  <text x="800" y="710" font-size="10" fill="#aaa" text-anchor="middle" letter-spacing="2">RESOLVES TO LEFT OR RIGHT</text>
  <line x1="800" y1="660" x2="800" y2="700" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>


  <!-- RIGHT PATH — Declined -->
  <rect x="1180" y="440" width="280" height="80" rx="2" fill="white" stroke="#111" stroke-width="1.5"/>
  <text x="1320" y="473" font-size="11" font-weight="700" letter-spacing="3" fill="#111" text-anchor="middle">NOTIFY MEMBER</text>
  <text x="1320" y="492" font-size="10" fill="#666" text-anchor="middle">Payment decline email</text>

  <line x1="1320" y1="520" x2="1320" y2="580" stroke="#111" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="1180" y="580" width="280" height="80" rx="2" fill="white" stroke="#111" stroke-width="1.5"/>
  <text x="1320" y="613" font-size="11" font-weight="700" letter-spacing="3" fill="#111" text-anchor="middle">NOTIFY TEAM</text>
  <text x="1320" y="632" font-size="10" fill="#666" text-anchor="middle">Flag for manual review</text>

  <line x1="1320" y1="660" x2="1320" y2="720" stroke="#111" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="1180" y="720" width="280" height="80" rx="2" fill="white" stroke="#111" stroke-width="1.5"/>
  <text x="1320" y="753" font-size="11" font-weight="700" letter-spacing="3" fill="#111" text-anchor="middle">CRM CLEANUP</text>
  <text x="1320" y="772" font-size="10" fill="#666" text-anchor="middle">Auto-clear failed record</text>

  <line x1="1320" y1="800" x2="1320" y2="860" stroke="#111" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="1180" y="860" width="280" height="60" rx="2" fill="white" stroke="#111" stroke-width="1.5"/>
  <text x="1320" y="893" font-size="11" font-weight="700" letter-spacing="3" fill="#666" text-anchor="middle">EXCEPTION ONLY</text>


  <!-- Stats bar at bottom -->
  <line x1="80" y1="958" x2="1520" y2="958" stroke="#ccc" stroke-width="1"/>
  <text x="80" y="980" font-size="10" font-weight="700" letter-spacing="3" fill="#999">ZERO MANUAL ENTRY</text>
  <text x="420" y="980" font-size="10" fill="#ccc">///</text>
  <text x="460" y="980" font-size="10" font-weight="700" letter-spacing="3" fill="#999">3 AUTOMATED PATHS</text>
  <text x="780" y="980" font-size="10" fill="#ccc">///</text>
  <text x="820" y="980" font-size="10" font-weight="700" letter-spacing="3" fill="#999">INSTANT PROCESSING</text>
  <text x="1160" y="980" font-size="10" fill="#ccc">///</text>
  <text x="1200" y="980" font-size="10" font-weight="700" letter-spacing="3" fill="#999">SELF-DOCUMENTING</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#111"/>
    </marker>
    <marker id="arrow-grey" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#999"/>
    </marker>
  </defs>
</svg>
