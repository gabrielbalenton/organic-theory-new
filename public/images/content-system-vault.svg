<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" style="background:#0a0a0c">
  <!-- Grid lines -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#FAFAFA" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#FAFAFA" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#FAFAFA" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#FAFAFA" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="160" y1="0" x2="160" y2="500" stroke="#FAFAFA" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="500" stroke="#FAFAFA" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="500" stroke="#FAFAFA" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="500" stroke="#FAFAFA" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Title -->
  <text x="40" y="52" font-family="monospace" font-size="10" fill="#FAFAFA" fill-opacity="0.3" letter-spacing="4" text-transform="uppercase">FIVE-PILLAR CONTENT SYSTEM</text>

  <!-- Central hub -->
  <circle cx="400" cy="250" r="44" fill="none" stroke="#FAFAFA" stroke-opacity="0.15" stroke-width="1.5"/>
  <circle cx="400" cy="250" r="28" fill="none" stroke="#FAFAFA" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="372" y1="222" x2="428" y2="278" stroke="#FAFAFA" stroke-opacity="0.2" stroke-width="1.5"/>
  <line x1="428" y1="222" x2="372" y2="278" stroke="#FAFAFA" stroke-opacity="0.2" stroke-width="1.5"/>
  <text x="400" y="257" font-family="monospace" font-size="9" fill="#FAFAFA" fill-opacity="0.5" text-anchor="middle" letter-spacing="2">CORE</text>

  <!-- Pillar 1 — Strategy (top) -->
  <line x1="400" y1="206" x2="400" y2="138" stroke="#FAFAFA" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4 4"/>
  <rect x="350" y="80" width="100" height="56" fill="none" stroke="#FAFAFA" stroke-opacity="0.15" stroke-width="1"/>
  <text x="400" y="107" font-family="monospace" font-size="9" fill="#FAFAFA" fill-opacity="0.5" text-anchor="middle" letter-spacing="2">01</text>
  <text x="400" y="122" font-family="monospace" font-size="8" fill="#FAFAFA" fill-opacity="0.3" text-anchor="middle" letter-spacing="1">STRATEGY</text>

  <!-- Pillar 2 — Research (top-right) -->
  <line x1="430" y1="222" x2="554" y2="154" stroke="#FAFAFA" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4 4"/>
  <rect x="548" y="120" width="110" height="56" fill="none" stroke="#FAFAFA" stroke-opacity="0.15" stroke-width="1"/>
  <text x="603" y="147" font-family="monospace" font-size="9" fill="#FAFAFA" fill-opacity="0.5" text-anchor="middle" letter-spacing="2">02</text>
  <text x="603" y="162" font-family="monospace" font-size="8" fill="#FAFAFA" fill-opacity="0.3" text-anchor="middle" letter-spacing="1">RESEARCH</text>

  <!-- Pillar 3 — Production (bottom-right) -->
  <line x1="438" y1="272" x2="554" y2="342" stroke="#FAFAFA" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4 4"/>
  <rect x="548" y="328" width="110" height="56" fill="none" stroke="#FAFAFA" stroke-opacity="0.15" stroke-width="1"/>
  <text x="603" y="355" font-family="monospace" font-size="9" fill="#FAFAFA" fill-opacity="0.5" text-anchor="middle" letter-spacing="2">03</text>
  <text x="603" y="370" font-family="monospace" font-size="8" fill="#FAFAFA" fill-opacity="0.3" text-anchor="middle" letter-spacing="1">PRODUCTION</text>

  <!-- Pillar 4 — Distribution (bottom-left) -->
  <line x1="362" y1="272" x2="246" y2="342" stroke="#FAFAFA" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4 4"/>
  <rect x="140" y="328" width="110" height="56" fill="none" stroke="#FAFAFA" stroke-opacity="0.15" stroke-width="1"/>
  <text x="195" y="355" font-family="monospace" font-size="9" fill="#FAFAFA" fill-opacity="0.5" text-anchor="middle" letter-spacing="2">04</text>
  <text x="195" y="370" font-family="monospace" font-size="8" fill="#FAFAFA" fill-opacity="0.3" text-anchor="middle" letter-spacing="1">DISTRIBUTION</text>

  <!-- Pillar 5 — Analytics (top-left) -->
  <line x1="370" y1="222" x2="246" y2="154" stroke="#FAFAFA" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4 4"/>
  <rect x="140" y="120" width="110" height="56" fill="none" stroke="#FAFAFA" stroke-opacity="0.15" stroke-width="1"/>
  <text x="195" y="147" font-family="monospace" font-size="9" fill="#FAFAFA" fill-opacity="0.5" text-anchor="middle" letter-spacing="2">05</text>
  <text x="195" y="162" font-family="monospace" font-size="8" fill="#FAFAFA" fill-opacity="0.3" text-anchor="middle" letter-spacing="1">ANALYTICS</text>

  <!-- Feedback loop arc (dashed orbit) -->
  <ellipse cx="400" cy="250" rx="160" ry="130" fill="none" stroke="#FAFAFA" stroke-opacity="0.05" stroke-width="1" stroke-dasharray="6 6"/>

  <!-- Corner label -->
  <text x="760" y="480" font-family="monospace" font-size="9" fill="#FAFAFA" fill-opacity="0.15" text-anchor="end" letter-spacing="2">O+X</text>
</svg>
